<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Assistant</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        /* 引入指定字体 */
        @font-face {
            font-family: 'CustomPrintFont';
            src: url('https://pic9.fukit.cn/autoupload/cOMlgH-30m8S3pmmZ6PYquwlmlLJaKxPALeXht63ndw/20260411/OlFv/Xxistudio-%E6%89%93%E5%8D%B0%E4%BD%93100.ttf') format('truetype');
        }

        /* 基础重置与极简黑白方角设定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'CustomPrintFont', sans-serif;
            border-radius: 0 !important;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        button, input, textarea {
            border: 1px solid #000000;
            background: #ffffff;
            color: #000000;
            outline: none;
            transition: all 0.2s ease;
        }

        button { cursor: pointer; text-transform: uppercase; }
        button:hover { background: #000000; color: #ffffff; }

        /* 开屏动画 */
        #splash-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }

        #splash-avatar {
            width: 80px; height: 80px; border: 2px solid #000;
            margin-bottom: 30px; background-size: cover; background-position: center;
            opacity: 0; animation: fadeIn 1s ease forwards;
        }

        .typewriter {
            overflow: hidden; white-space: nowrap; border-right: 2px solid #000;
            font-size: 24px; letter-spacing: 2px;
            animation: typing 3s steps(40, end) 1s forwards, blink-caret .75s step-end infinite;
            width: 0; margin-bottom: 40px;
        }

        @keyframes typing { to { width: 330px } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: #000 } }
        @keyframes fadeIn { to { opacity: 1; } }

        #enter-btn { padding: 10px 30px; font-size: 16px; opacity: 0; animation: fadeIn 1s ease 4s forwards; }

        /* 主界面 */
        #app-container { display: none; height: 100%; width: 100%; position: relative; flex-direction: column; }

        /* 顶部导航 */
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 15px 25px; border-bottom: 1px solid #000; background: #ffffff;
            z-index: 10; position: relative;
        }

        .icon-btn { width: 40px; height: 40px; display: flex; justify-content: center; align-items: center; font-size: 20px; font-weight: bold; }
        
        .avatar-group { position: absolute; left: 50%; transform: translateX(-50%); display: flex; gap: 15px; }
        .avatar {
            width: 45px; height: 45px; border: 1px solid #000; cursor: pointer;
            background-size: cover; background-position: center;
            display: flex; justify-content: center; align-items: center; font-size: 10px; text-align: center;
        }
        .avatar:hover::after {
            content: "EDIT"; background: rgba(255,255,255,0.8);
            width: 100%; height: 100%; display: flex; justify-content: center; align-items: center;
        }

        /* 侧栏 */
        #sidebar {
            position: absolute; top: 0; left: -300px; width: 250px; height: 100%;
            background: #ffffff; border-right: 1px solid #000; transition: left 0.3s ease;
            z-index: 100; padding: 80px 30px 30px 30px; display: flex; flex-direction: column; gap: 15px;
        }
        #sidebar.active { left: 0; }
        .sidebar-item { padding: 12px; border: 1px solid #000; text-align: center; cursor: pointer; font-size: 14px; letter-spacing: 1px; }

        /* 遮罩层 */
        #overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); display: none; z-index: 50; }

        /* 聊天区域 */
        #chat-area { flex: 1; padding: 30px; overflow-y: auto; display: flex; flex-direction: column; gap: 20px; background: #fcfcfc; }
        .message { max-width: 65%; padding: 15px 20px; border: 1px solid #000; line-height: 1.6; word-wrap: break-word; }
        .msg-user { align-self: flex-end; background: #000000; color: #ffffff; }
        .msg-ai { align-self: flex-start; background: #ffffff; color: #000000; }

        /* 底部输入区 */
        #input-area { display: flex; padding: 20px 30px; border-top: 1px solid #000; background: #ffffff; gap: 15px; align-items: center; }
        #msg-input { flex: 1; padding: 15px; font-size: 16px; resize: none; height: 52px; overflow: hidden; }
        .action-btn { height: 52px; padding: 0 25px; font-size: 14px; letter-spacing: 1px; }

        /* 弹窗通用样式 */
        .modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 450px; background: #ffffff; border: 2px solid #000; padding: 30px;
            z-index: 200; box-shadow: 15px 15px 0px rgba(0,0,0,1);
        }
        .modal h2 { margin-bottom: 20px; font-size: 20px; text-transform: uppercase; border-bottom: 1px solid #000; padding-bottom: 10px;}
        .form-group { margin-bottom: 15px; position: relative; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 12px; text-transform: uppercase;}
        .form-group input, .form-group textarea { width: 100%; padding: 10px; }
        .grid-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .grid-actions .action-btn { height: 45px; width: 100%; padding: 0; }

        /* 模型下拉 */
        #model-dropdown {
            display: none; position: absolute; top: 100%; left: 0; width: 100%;
            max-height: 150px; overflow-y: auto; background: #fff; border: 1px solid #000; border-top: none; z-index: 10;
        }
        .model-option { padding: 10px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 12px; }
        .model-option:hover { background: #000; color: #fff; }

        /* Char & Library 列表管理 */
        .list-container { max-height: 200px; overflow-y: auto; overflow-x: hidden; border: 1px solid #000; margin-bottom: 20px; }
        
        .char-item { display: flex; align-items: center; padding: 10px; border-bottom: 1px solid #000; cursor: pointer; }
        .char-item:last-child { border-bottom: none; }
        .char-item:hover, .char-item.active { background: #000; color: #fff; }
        .char-item-avatar { width: 30px; height: 30px; border: 1px solid currentColor; margin-right: 15px; background-size: cover; background-position: center; }
        
        #new-char-form { display: none; padding-top: 15px; border-top: 1px dashed #000; }

        /* 库列表向右滑动删除样式 */
        .lib-item-wrapper { position: relative; border-bottom: 1px solid #000; width: 100%; height: 50px; }
        .lib-item-wrapper:last-child { border-bottom: none; }
        .lib-btn-delete { 
            position: absolute; left: 0; top: 0; width: 80px; height: 100%;
            background: #000; color: #fff; display: flex; justify-content: center; align-items: center;
            font-size: 12px; cursor: pointer; text-transform: uppercase; font-weight: bold;
        }
        .lib-item-content {
            position: absolute; left: 0; top: 0; width: 100%; height: 100%;
            background: #fff; display: flex; align-items: center; padding: 0 15px;
            cursor: pointer; z-index: 2; transition: transform 0.3s ease; user-select: none;
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 14px;
        }
        .lib-item-content:hover { background: #f0f0f0; }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div id="splash-avatar"></div>
        <div class="typewriter">你的所有烦恼我都想为你解决</div>
        <button id="enter-btn" onclick="enterApp()">ENTER</button>
    </div>

    <input type="file" id="right-avatar-upload" accept="image/*">
    <input type="file" id="left-avatar-upload" accept="image/*">
    <input type="file" id="char-avatar-upload" accept="image/*">
    <input type="file" id="import-zip" accept=".zip">

    <div id="app-container">
        <header>
            <button class="icon-btn" onclick="toggleSidebar()">≡</button>
            <div class="avatar-group">
                <div class="avatar" id="left-avatar" onclick="document.getElementById('left-avatar-upload').click()"></div>
                <div class="avatar" id="right-avatar" onclick="document.getElementById('right-avatar-upload').click()"></div>
            </div>
            <button class="action-btn" onclick="openCharModal()">CHAR</button>
        </header>

        <div id="sidebar">
            <button class="icon-btn" style="position:absolute; top:20px; right:20px;" onclick="toggleSidebar()">×</button>
            <div class="sidebar-item" onclick="openModal('api-modal'); toggleSidebar();">API</div>
            <div class="sidebar-item" onclick="saveCurrentChat()">SAVE</div>
            <div class="sidebar-item" onclick="newChat()">NEW</div>
            <div class="sidebar-item" onclick="openLibraryModal(); toggleSidebar();">LIBRARY</div>
            <div class="sidebar-item" onclick="exportBackup()">BACKUP</div>
            <div class="sidebar-item" onclick="document.getElementById('import-zip').click(); toggleSidebar();">IMPORT</div>
        </div>
        <div id="overlay" onclick="toggleSidebar()"></div>

        <div id="chat-area">
            <div class="message msg-ai" id="welcome-msg">Waiting for initialization...</div>
        </div>

        <div id="input-area">
            <button class="action-btn" onclick="receiveMessage()">RECEIVE</button>
            <textarea id="msg-input" placeholder="Type a message..." rows="1"></textarea>
            <button class="action-btn" onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <div id="api-modal" class="modal">
        <h2>API Configuration</h2>
        <div class="form-group">
            <label>Proxy URL (反代):</label>
            <input type="text" id="api-url" placeholder="https://api.openai.com/v1/chat/completions">
        </div>
        <div class="form-group">
            <label>API Key:</label>
            <input type="password" id="api-key" placeholder="sk-...">
        </div>
        <div class="form-group">
            <label>Model:</label>
            <input type="text" id="api-model" placeholder="gpt-4">
            <div id="model-dropdown"></div>
        </div>
        <div class="grid-actions">
            <button class="action-btn" onclick="fetchModels(this)">Fetch Models</button>
            <button class="action-btn" onclick="testConnection(this)">Test</button>
            <button class="action-btn" onclick="saveApiConfig()">Save</button>
            <button class="action-btn" onclick="closeModal('api-modal')">Close</button>
        </div>
    </div>

    <div id="char-modal" class="modal">
        <h2>Characters</h2>
        <div id="char-list" class="list-container"></div>
        <button class="action-btn" style="width: 100%; height: 40px; margin-bottom: 10px;" onclick="toggleNewCharForm()">+ CREATE NEW CHAR</button>

        <div id="new-char-form">
            <div class="form-group" style="display: flex; gap: 15px; align-items: center;">
                <div class="avatar" id="new-char-avatar-preview" onclick="document.getElementById('char-avatar-upload').click()">Avatar</div>
                <div style="flex:1;">
                    <label>Name:</label>
                    <input type="text" id="new-char-name" placeholder="Name">
                </div>
            </div>
            <div class="form-group">
                <label>Details / Prompt:</label>
                <textarea id="new-char-details" rows="3" placeholder="Personality, background..."></textarea>
            </div>
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button class="action-btn" style="height: 40px;" onclick="saveNewChar()">Save</button>
            </div>
        </div>
        <div style="margin-top: 20px; text-align: right;">
            <button class="action-btn" style="height: 40px;" onclick="closeModal('char-modal')">Close</button>
        </div>
    </div>

    <div id="library-modal" class="modal">
        <h2>Library</h2>
        <div id="library-list" class="list-container"></div>
        <div style="margin-top: 20px; text-align: right;">
            <button class="action-btn" style="height: 40px;" onclick="closeModal('library-modal')">Close</button>
        </div>
    </div>

    <script>
        let chars = JSON.parse(localStorage.getItem('savedChars')) || [];
        let savedChats = JSON.parse(localStorage.getItem('savedChats')) || [];
        let activeCharId = localStorage.getItem('activeCharId') || null;
        let tempNewCharAvatarData = '';

        // === 初始化与开屏 ===
        window.onload = () => {
            const defaultUserSvg = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="black" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"></path></svg>';
            const defaultAiSvg = 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" fill="none" stroke="black" viewBox="0 0 24 24"><path stroke-linecap="square" stroke-linejoin="miter" stroke-width="2" d="M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zM12 8v4l3 3"></path></svg>';
            
            document.getElementById('right-avatar').style.backgroundImage = `url('${localStorage.getItem('userAvatar') || defaultUserSvg}')`;
            document.getElementById('left-avatar').style.backgroundImage = `url('${defaultAiSvg}')`;

            // 开屏随机选取 Char 头像
            if (chars.length > 0) {
                const randomChar = chars[Math.floor(Math.random() * chars.length)];
                if (randomChar.avatar) {
                    document.getElementById('splash-avatar').style.backgroundImage = `url('${randomChar.avatar}')`;
                } else {
                    document.getElementById('splash-avatar').style.backgroundImage = `url('${defaultAiSvg}')`;
                }
            } else {
                document.getElementById('splash-avatar').style.backgroundImage = `url('${defaultAiSvg}')`;
            }
        };

        function enterApp() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            loadConfig();
        }

        // === 基础交互 ===
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('active');
            document.getElementById('overlay').style.display = sb.classList.contains('active') ? 'block' : 'none';
        }
        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // 头像处理
        function setupAvatarUpload(inputId, callback) {
            document.getElementById(inputId).addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(evt) { callback(evt.target.result); }
                    reader.readAsDataURL(file);
                }
            });
        }
        setupAvatarUpload('right-avatar-upload', data => { document.getElementById('right-avatar').style.backgroundImage = `url(${data})`; localStorage.setItem('userAvatar', data); });
        setupAvatarUpload('left-avatar-upload', data => { document.getElementById('left-avatar').style.backgroundImage = `url(${data})`; });
        setupAvatarUpload('char-avatar-upload', data => { tempNewCharAvatarData = data; document.getElementById('new-char-avatar-preview').style.backgroundImage = `url(${data})`; document.getElementById('new-char-avatar-preview').innerText = '';});

        // === 备份与导入 (Zip 逻辑) ===
        async function exportBackup() {
            toggleSidebar();
            const zip = new JSZip();
            const dataStr = JSON.stringify(localStorage);
            zip.file("backup.json", dataStr);
            
            const blob = await zip.generateAsync({type:"blob"});
            const a = document.createElement("a");
            a.href = URL.createObjectURL(blob);
            a.download = "writing_assistant_backup.zip";
            a.click();
        }

        document.getElementById('import-zip').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;
            JSZip.loadAsync(file).then(function(zip) {
                return zip.file("backup.json").async("string");
            }).then(function(text) {
                const data = JSON.parse(text);
                localStorage.clear();
                for (let key in data) localStorage.setItem(key, data[key]);
                alert("Import successful! Reloading to apply changes.");
                location.reload();
            }).catch(function(err) {
                alert("Import failed. Ensure it is a valid backup zip file. Error: " + err);
            });
        });

        // === 对话与库管理 ===
        function saveCurrentChat() {
            const htmlContent = document.getElementById('chat-area').innerHTML;
            const previewText = document.getElementById('chat-area').innerText.substring(0, 30).replace(/\n/g, ' ') + '...';
            const chatObj = {
                id: Date.now().toString(),
                date: new Date().toLocaleString(),
                preview: previewText,
                html: htmlContent
            };
            savedChats.unshift(chatObj);
            localStorage.setItem('savedChats', JSON.stringify(savedChats));
            alert("Chat successfully saved to Library!");
            toggleSidebar();
        }

        function openLibraryModal() {
            const listEl = document.getElementById('library-list');
            listEl.innerHTML = '';
            if(savedChats.length === 0) {
                listEl.innerHTML = '<div style="padding:10px; text-align:center; font-size:12px;">Library is empty.</div>';
                openModal('library-modal');
                return;
            }

            savedChats.forEach(chat => {
                const wrapper = document.createElement('div');
                wrapper.className = 'lib-item-wrapper';
                
                // 删除按钮
                const delBtn = document.createElement('div');
                delBtn.className = 'lib-btn-delete';
                delBtn.innerText = 'DELETE';
                delBtn.onclick = () => { deleteChat(chat.id); };

                // 可滑动的内容区域
                const content = document.createElement('div');
                content.className = 'lib-item-content';
                content.innerText = `[${chat.date}] ${chat.preview}`;
                content.onclick = () => { loadChat(chat.html); closeModal('library-modal'); };

                // 纯 JS 实现向右滑动交互
                let startX = 0;
                let currentTranslate = 0;
                
                content.addEventListener('pointerdown', (e) => { startX = e.clientX; content.style.transition = 'none'; content.setPointerCapture(e.pointerId); });
                content.addEventListener('pointermove', (e) => {
                    if (startX === 0) return;
                    let diff = e.clientX - startX;
                    if (diff > 0 && diff <= 80) currentTranslate = diff; // 向右滑动
                    else if (diff > 80) currentTranslate = 80;
                    else currentTranslate = 0; // 不允许向左滑出界
                    content.style.transform = `translateX(${currentTranslate}px)`;
                });
                content.addEventListener('pointerup', (e) => {
                    startX = 0; content.style.transition = 'transform 0.3s ease';
                    if (currentTranslate > 40) { currentTranslate = 80; } else { currentTranslate = 0; }
                    content.style.transform = `translateX(${currentTranslate}px)`;
                });

                wrapper.appendChild(delBtn);
                wrapper.appendChild(content);
                listEl.appendChild(wrapper);
            });
            openModal('library-modal');
        }

        function deleteChat(id) {
            savedChats = savedChats.filter(c => c.id !== id);
            localStorage.setItem('savedChats', JSON.stringify(savedChats));
            openLibraryModal(); // 刷新列表
        }

        function loadChat(html) { document.getElementById('chat-area').innerHTML = html; }
        function newChat() {
            document.getElementById('chat-area').innerHTML = '<div class="message msg-ai" id="welcome-msg">[System] New conversation started.</div>';
            toggleSidebar();
            if(activeCharId) selectChar(activeCharId);
        }

        // === API 与发送交互 (复用原有逻辑) ===
        const msgInput = document.getElementById('msg-input');
        msgInput.addEventListener('keypress', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message msg-${sender}`;
            msgDiv.innerText = text;
            document.getElementById('chat-area').appendChild(msgDiv);
            document.getElementById('chat-area').scrollTop = document.getElementById('chat-area').scrollHeight;
            return msgDiv;
        }

        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;
            appendMessage(text, 'user');
            msgInput.value = '';
        }

        async function receiveMessage() {
            const url = localStorage.getItem('apiUrl');
            const key = localStorage.getItem('apiKey');
            const model = localStorage.getItem('apiModel');
            const activeChar = chars.find(c => c.id === activeCharId) || { name: 'Assistant', details: 'You are a helpful writing assistant.' };

            if (!url || !key) return alert("Please configure API settings first.");

            let messages = [{ role: "system", content: `You are ${activeChar.name}. ${activeChar.details} Respond in character.` }];
            document.querySelectorAll('.message').forEach(el => {
                if (el.id !== 'welcome-msg') messages.push({ role: el.classList.contains('msg-user') ? 'user' : 'assistant', content: el.innerText });
            });

            if (messages.length === 1) return;
            const loadingMsg = appendMessage('...', 'ai');

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${key}` },
                    body: JSON.stringify({ model: model, messages: messages })
                });
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                const data = await response.json();
                loadingMsg.innerText = data.choices[0].message.content;
            } catch (error) { loadingMsg.innerText = "[Error] " + error.message; }
        }

        async function fetchModels(btn) {
            const originalText = btn.innerText;
            btn.innerText = "FETCHING...";
            let url = document.getElementById('api-url').value;
            let key = document.getElementById('api-key').value;
            let modelUrl = url.split('/v1/')[0] + '/v1/models';

            try {
                const res = await fetch(modelUrl, { headers: { 'Authorization': `Bearer ${key}` } });
                if(!res.ok) throw new Error("API Refused");
                const data = await res.json();
                const dropdown = document.getElementById('model-dropdown');
                dropdown.innerHTML = ''; dropdown.style.display = 'block';
                (data.data || []).forEach(m => {
                    let opt = document.createElement('div'); opt.className = 'model-option'; opt.innerText = m.id;
                    opt.onclick = () => { document.getElementById('api-model').value = m.id; dropdown.style.display = 'none'; };
                    dropdown.appendChild(opt);
                });
            } catch (e) { alert("Fetch failed. Enter model manually."); }
            btn.innerText = originalText;
        }

        document.addEventListener('click', (e) => { if(!e.target.closest('.form-group')) document.getElementById('model-dropdown').style.display = 'none'; });

        function saveApiConfig() {
            localStorage.setItem('apiUrl', document.getElementById('api-url').value);
            localStorage.setItem('apiKey', document.getElementById('api-key').value);
            localStorage.setItem('apiModel', document.getElementById('api-model').value);
            alert("API Saved!"); closeModal('api-modal');
        }

        async function testConnection(btn) {
            btn.innerText = "TESTING...";
            try {
                const res = await fetch(document.getElementById('api-url').value, {
                    method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${document.getElementById('api-key').value}` },
                    body: JSON.stringify({ model: document.getElementById('api-model').value, messages: [{role: "user", content: "hi"}] })
                });
                alert(res.ok ? "Success!" : "Failed!");
            } catch (e) { alert("Error: " + e.message); }
            btn.innerText = "Test";
        }

        // === Char 管理 ===
        function openCharModal() { renderCharList(); openModal('char-modal'); }
        function toggleNewCharForm() {
            const form = document.getElementById('new-char-form');
            form.style.display = form.style.display === 'block' ? 'none' : 'block';
        }
        function saveNewChar() {
            const name = document.getElementById('new-char-name').value.trim();
            const details = document.getElementById('new-char-details').value.trim();
            if(!name) return alert("Name required!");

            chars.push({ id: Date.now().toString(), name: name, details: details, avatar: tempNewCharAvatarData });
            localStorage.setItem('savedChars', JSON.stringify(chars));
            
            document.getElementById('new-char-name').value = ''; document.getElementById('new-char-details').value = '';
            document.getElementById('new-char-avatar-preview').style.backgroundImage = ''; document.getElementById('new-char-avatar-preview').innerText = 'Avatar';
            tempNewCharAvatarData = '';
            toggleNewCharForm(); renderCharList();
        }

        function renderCharList() {
            const listEl = document.getElementById('char-list'); listEl.innerHTML = '';
            if(chars.length === 0) { listEl.innerHTML = '<div style="padding:10px; text-align:center; font-size:12px;">No chars yet.</div>'; return; }

            chars.forEach(char => {
                const item = document.createElement('div');
                item.className = `char-item ${char.id === activeCharId ? 'active' : ''}`;
                item.innerHTML = `<div class="char-item-avatar" style="${char.avatar ? `background-image: url(${char.avatar});` : ''}"></div><div>${char.name}</div>`;
                item.onclick = () => selectChar(char.id);
                listEl.appendChild(item);
            });
        }

        function selectChar(id) {
            activeCharId = id; localStorage.setItem('activeCharId', id); renderCharList();
            const activeChar = chars.find(c => c.id === id);
            if(activeChar) {
                if(activeChar.avatar) {
                    document.getElementById('left-avatar').style.backgroundImage = `url(${activeChar.avatar})`;
                    document.getElementById('left-avatar').innerText = '';
                } else {
                    document.getElementById('left-avatar').style.backgroundImage = '';
                    document.getElementById('left-avatar').innerText = activeChar.name.charAt(0);
                }
                document.getElementById('welcome-msg').innerText = `[System] Activated Char: ${activeChar.name}`;
            }
        }

        function loadConfig() {
            document.getElementById('api-url').value = localStorage.getItem('apiUrl') || '';
            document.getElementById('api-key').value = localStorage.getItem('apiKey') || '';
            document.getElementById('api-model').value = localStorage.getItem('apiModel') || 'gpt-4';
            if(activeCharId) selectChar(activeCharId);
        }
    </script>
</body>
</html>
