<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writing Assistant</title>
    <style>
        /* 引入指定字体 */
        @font-face {
            font-family: 'CustomPrintFont';
            src: url('https://pic9.fukit.cn/autoupload/cOMlgH-30m8S3pmmZ6PYquwlmlLJaKxPALeXht63ndw/20260411/OlFv/Xxistudio-%E6%89%93%E5%8D%B0%E4%BD%93100.ttf') format('truetype');
        }

        /* 基础重置与极简黑白方角设定 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'CustomPrintFont', sans-serif;
            border-radius: 0 !important; /* 强制全局方角 */
        }

        body {
            background-color: #ffffff;
            color: #000000;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        button, input, textarea {
            border: 1px solid #000000;
            background: #ffffff;
            color: #000000;
            outline: none;
            transition: all 0.2s ease;
        }

        button {
            cursor: pointer;
            text-transform: uppercase;
        }

        button:hover {
            background: #000000;
            color: #ffffff;
        }

        /* 开屏动画 */
        #splash-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .typewriter {
            overflow: hidden;
            white-space: nowrap;
            border-right: 2px solid #000;
            font-size: 24px;
            letter-spacing: 2px;
            animation: typing 3s steps(40, end), blink-caret .75s step-end infinite;
            margin-bottom: 40px;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 330px }
        }
        @keyframes blink-caret {
            from, to { border-color: transparent }
            50% { border-color: #000 }
        }

        #enter-btn {
            padding: 10px 30px;
            font-size: 16px;
            opacity: 0;
            animation: fadeIn 1s ease 3s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        /* 主界面 */
        #app-container {
            display: none;
            height: 100%;
            width: 100%;
            position: relative;
            flex-direction: column;
        }

        /* 顶部导航 */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            border-bottom: 1px solid #000;
            background: #ffffff;
            z-index: 10;
        }

        .header-left, .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .icon-btn {
            width: 40px; height: 40px;
            display: flex; justify-content: center; align-items: center;
            font-size: 20px;
            font-weight: bold;
        }

        /* 头像 */
        .avatar-group {
            display: flex;
            gap: 15px;
        }
        .avatar {
            width: 45px; height: 45px;
            border: 1px solid #000;
            cursor: pointer;
            background-size: cover;
            background-position: center;
            display: flex; justify-content: center; align-items: center;
            font-size: 10px; text-align: center;
        }
        .avatar:hover::after {
            content: "EDIT";
            background: rgba(255,255,255,0.8);
            width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
        }

        /* 侧栏 - 无中文 */
        #sidebar {
            position: absolute;
            top: 0; left: -300px;
            width: 250px; height: 100%;
            background: #ffffff;
            border-right: 1px solid #000;
            transition: left 0.3s ease;
            z-index: 100;
            padding: 80px 30px 30px 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        #sidebar.active { left: 0; }
        .sidebar-item {
            padding: 15px;
            border: 1px solid #000;
            text-align: center;
            cursor: pointer;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* 遮罩层 */
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8);
            display: none; z-index: 50;
        }

        /* 聊天区域 */
        #chat-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #fcfcfc;
        }

        .message {
            max-width: 65%;
            padding: 15px 20px;
            border: 1px solid #000;
            line-height: 1.6;
            word-wrap: break-word;
        }

        .msg-user {
            align-self: flex-end;
            background: #000000;
            color: #ffffff;
        }

        .msg-ai {
            align-self: flex-start;
            background: #ffffff;
            color: #000000;
        }

        /* 底部输入区 */
        #input-area {
            display: flex;
            padding: 20px 30px;
            border-top: 1px solid #000;
            background: #ffffff;
            gap: 15px;
            align-items: center;
        }

        #msg-input {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            resize: none;
            height: 52px;
            overflow: hidden;
        }

        .action-btn {
            height: 52px;
            padding: 0 25px;
            font-size: 14px;
            letter-spacing: 1px;
        }

        /* 弹窗样式 */
        .modal {
            display: none;
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            background: #ffffff;
            border: 2px solid #000;
            padding: 30px;
            z-index: 200;
            box-shadow: 15px 15px 0px rgba(0,0,0,1);
        }

        .modal h2 { margin-bottom: 20px; font-size: 20px; text-transform: uppercase; border-bottom: 1px solid #000; padding-bottom: 10px;}
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-size: 12px; text-transform: uppercase;}
        .form-group input, .form-group textarea { width: 100%; padding: 10px; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; justify-content: flex-end; }
        
        /* 隐藏文件输入框 */
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="typewriter">你的所有烦恼我都想为你解决</div>
        <button id="enter-btn" onclick="enterApp()">ENTER</button>
    </div>

    <input type="file" id="user-avatar-upload" accept="image/*">
    <input type="file" id="ai-avatar-upload" accept="image/*">
    <input type="file" id="char-avatar-upload" accept="image/*">

    <div id="app-container">
        <header>
            <div class="header-left">
                <button class="icon-btn" onclick="toggleSidebar()">≡</button>
                <div class="avatar-group">
                    <div class="avatar" id="user-avatar" onclick="document.getElementById('user-avatar-upload').click()" style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22none%22 stroke=%22black%22 viewBox=%220 0 24 24%22><path stroke-linecap=%22square%22 stroke-linejoin=%22miter%22 stroke-width=%222%22 d=%22M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2M12 11a4 4 0 1 0 0-8 4 4 0 0 0 0 8z%22></path></svg>');"></div>
                    <div class="avatar" id="ai-avatar" onclick="document.getElementById('ai-avatar-upload').click()" style="background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22none%22 stroke=%22black%22 viewBox=%220 0 24 24%22><path stroke-linecap=%22square%22 stroke-linejoin=%22miter%22 stroke-width=%222%22 d=%22M12 2a10 10 0 1 0 0 20 10 10 0 0 0 0-20zM12 8v4l3 3%22></path></svg>');"></div>
                </div>
            </div>
            <div class="header-right">
                <button class="action-btn" onclick="openModal('char-modal')">CHAR</button>
            </div>
        </header>

        <div id="sidebar">
            <button class="icon-btn" style="position:absolute; top:20px; right:20px;" onclick="toggleSidebar()">×</button>
            <div class="sidebar-item" onclick="openModal('api-modal'); toggleSidebar();">API</div>
            <div class="sidebar-item" onclick="saveChat()">SAVE</div>
            <div class="sidebar-item" onclick="newChat()">NEW</div>
            <div class="sidebar-item" onclick="alert('LIBRARY: No saved chats yet.')">LIBRARY</div>
        </div>
        <div id="overlay" onclick="toggleSidebar()"></div>

        <div id="chat-area">
            <div class="message msg-ai" id="welcome-msg">Waiting for initialization...</div>
        </div>

        <div id="input-area">
            <button class="action-btn" onclick="receiveMessage()">RECEIVE</button>
            <textarea id="msg-input" placeholder="Type a message..." rows="1"></textarea>
            <button class="action-btn" onclick="sendMessage()">SEND</button>
        </div>
    </div>

    <div id="api-modal" class="modal">
        <h2>API Configuration</h2>
        <div class="form-group">
            <label>Proxy URL (反代):</label>
            <input type="text" id="api-url" placeholder="https://api.openai.com/v1/chat/completions">
        </div>
        <div class="form-group">
            <label>API Key:</label>
            <input type="password" id="api-key" placeholder="sk-...">
        </div>
        <div class="form-group">
            <label>Model:</label>
            <input type="text" id="api-model" placeholder="gpt-4">
        </div>
        <div class="modal-actions">
            <button class="action-btn" onclick="fetchModels()">Fetch Models</button>
            <button class="action-btn" onclick="testConnection()">Test</button>
            <button class="action-btn" onclick="saveApiConfig()">Save</button>
            <button class="action-btn" onclick="closeModal('api-modal')">Close</button>
        </div>
    </div>

    <div id="char-modal" class="modal">
        <h2>Character Settings</h2>
        <div class="form-group" style="display: flex; gap: 15px; align-items: center;">
            <div class="avatar" id="char-preview-avatar" onclick="document.getElementById('char-avatar-upload').click()">Avatar</div>
            <div style="flex:1;">
                <label>Name:</label>
                <input type="text" id="char-name" placeholder="Character Name">
            </div>
        </div>
        <div class="form-group">
            <label>Details / Prompt:</label>
            <textarea id="char-details" rows="5" placeholder="Describe the character's personality, background, and tone of voice..."></textarea>
        </div>
        <div class="modal-actions">
            <button class="action-btn" onclick="saveCharConfig()">Save & Apply</button>
            <button class="action-btn" onclick="closeModal('char-modal')">Close</button>
        </div>
    </div>

    <script>
        // === 基础界面交互 ===
        function enterApp() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('app-container').style.display = 'flex';
            loadConfig();
        }

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('overlay');
            sidebar.classList.toggle('active');
            overlay.style.display = sidebar.classList.contains('active') ? 'block' : 'none';
        }

        function openModal(id) { document.getElementById(id).style.display = 'block'; }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        // === 头像上传与裁剪逻辑 ===
        function setupAvatarUpload(inputId, targetId) {
            document.getElementById(inputId).addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const targets = Array.isArray(targetId) ? targetId : [targetId];
                        targets.forEach(id => {
                            document.getElementById(id).style.backgroundImage = `url(${event.target.result})`;
                            document.getElementById(id).innerHTML = ''; // 清除SVG或文字
                        });
                    }
                    reader.readAsDataURL(file);
                }
            });
        }
        setupAvatarUpload('user-avatar-upload', 'user-avatar');
        setupAvatarUpload('ai-avatar-upload', 'ai-avatar');
        setupAvatarUpload('char-avatar-upload', ['char-preview-avatar', 'ai-avatar']);

        // === 聊天逻辑 ===
        const chatArea = document.getElementById('chat-area');
        const msgInput = document.getElementById('msg-input');

        msgInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function appendMessage(text, sender) {
            const msgDiv = document.createElement('div');
            msgDiv.className = `message msg-${sender}`;
            msgDiv.innerText = text;
            chatArea.appendChild(msgDiv);
            chatArea.scrollTop = chatArea.scrollHeight;
            return msgDiv;
        }

        function sendMessage() {
            const text = msgInput.value.trim();
            if (!text) return;
            appendMessage(text, 'user');
            msgInput.value = '';
        }

        // === 核心API逻辑与人物设定 ===
        async function receiveMessage() {
            const url = localStorage.getItem('apiUrl');
            const key = localStorage.getItem('apiKey');
            const model = localStorage.getItem('apiModel');
            const charName = localStorage.getItem('charName') || 'Assistant';
            const charDetails = localStorage.getItem('charDetails') || 'You are a helpful writing assistant.';

            if (!url || !key) {
                alert("Please configure API settings first in the sidebar.");
                openModal('api-modal');
                return;
            }

            // 构建上下文
            let messages = [{ role: "system", content: `You are ${charName}. ${charDetails} Respond to the user's latest query in character.` }];
            
            document.querySelectorAll('.message').forEach(el => {
                if (el.id !== 'welcome-msg') {
                    messages.push({
                        role: el.classList.contains('msg-user') ? 'user' : 'assistant',
                        content: el.innerText
                    });
                }
            });

            if (messages.length === 1) return; // 只有系统提示词时无须请求

            const loadingMsg = appendMessage('...', 'ai');

            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${key}`
                    },
                    body: JSON.stringify({ model: model, messages: messages })
                });
                
                if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
                
                const data = await response.json();
                loadingMsg.innerText = data.choices[0].message.content;
            } catch (error) {
                loadingMsg.innerText = "[Connection Error] " + error.message;
            }
        }

        // === 配置存储与读取 ===
        function saveApiConfig() {
            localStorage.setItem('apiUrl', document.getElementById('api-url').value);
            localStorage.setItem('apiKey', document.getElementById('api-key').value);
            localStorage.setItem('apiModel', document.getElementById('api-model').value);
            alert("API Configuration Saved!");
            closeModal('api-modal');
        }

        function saveCharConfig() {
            const name = document.getElementById('char-name').value;
            localStorage.setItem('charName', name);
            localStorage.setItem('charDetails', document.getElementById('char-details').value);
            document.getElementById('welcome-msg').innerText = `[System] Profile applied. I am now ${name}.`;
            alert("Character Configuration Saved!");
            closeModal('char-modal');
        }

        function loadConfig() {
            document.getElementById('api-url').value = localStorage.getItem('apiUrl') || '';
            document.getElementById('api-key').value = localStorage.getItem('apiKey') || '';
            document.getElementById('api-model').value = localStorage.getItem('apiModel') || 'gpt-4';
            
            const savedName = localStorage.getItem('charName');
            if(savedName) {
                document.getElementById('char-name').value = savedName;
                document.getElementById('char-details').value = localStorage.getItem('charDetails') || '';
                document.getElementById('welcome-msg').innerText = `[System] Initialized as ${savedName}.`;
            }
        }

        // === 辅助 API 功能 ===
        async function testConnection() {
            const btn = event.target;
            btn.innerText = "Testing...";
            try {
                const res = await fetch(document.getElementById('api-url').value, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${document.getElementById('api-key').value}` },
                    body: JSON.stringify({ model: document.getElementById('api-model').value, messages: [{role: "user", content: "hi"}] })
                });
                if(res.ok) alert("Connection Successful!");
                else alert("Connection Failed. Check URL and Key.");
            } catch (e) {
                alert("Error: " + e.message);
            }
            btn.innerText = "Test";
        }

        function fetchModels() {
            alert("Model fetching logic depends on the specific proxy endpoint. Please enter the model ID manually (e.g., gpt-3.5-turbo).");
        }

        function newChat() {
            chatArea.innerHTML = '<div class="message msg-ai" id="welcome-msg">[System] New conversation started.</div>';
            toggleSidebar();
        }

        function saveChat() {
            alert("Chat saved to memory (Mock).");
            toggleSidebar();
        }
    </script>
</body>
</html>
